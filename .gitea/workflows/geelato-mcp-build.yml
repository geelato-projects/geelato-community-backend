name: geelato-mcp-build

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build MCP modules
        run: mvn -B -f geelato-mcp/pom.xml clean package -DskipTests

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: geelato-mcp/mcp-test-site/pnpm-lock.yaml

      - name: Enable Corepack
        run: corepack enable

      - name: Install frontend dependencies
        working-directory: geelato-mcp/mcp-test-site
        run: pnpm install --frozen-lockfile

      - name: Build frontend site
        working-directory: geelato-mcp/mcp-test-site
        run: pnpm build
