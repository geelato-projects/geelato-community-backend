name: Build Project

on:
  push:
    branches: ['master']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          cache-dependency-path: '**/pom.xml'

      - name: Generate Maven settings
        env:
          ALIYUN_MAVEN_REPO_ID: ${{ secrets.ALIYUN_MAVEN_REPO_ID }}
          ALIYUN_MAVEN_REPO_URL: ${{ secrets.ALIYUN_MAVEN_REPO_URL }}
          ALIYUN_MAVEN_USERNAME: ${{ secrets.ALIYUN_MAVEN_USERNAME }}
          ALIYUN_MAVEN_PASSWORD: ${{ secrets.ALIYUN_MAVEN_PASSWORD }}
        run: |
          mkdir -p "$HOME/.m2"
          cat <<EOF > "$HOME/.m2/settings.xml"
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <mirrors>
              <mirror>
                <id>aliyun-public</id>
                <mirrorOf>central</mirrorOf>
                <name>Aliyun Maven Public Mirror</name>
                <url>https://maven.aliyun.com/repository/public</url>
              </mirror>
            </mirrors>
            <servers>
              <server>
                <id>${ALIYUN_MAVEN_REPO_ID}</id>
                <username>${ALIYUN_MAVEN_USERNAME}</username>
                <password>${ALIYUN_MAVEN_PASSWORD}</password>
              </server>
            </servers>
            <profiles>
              <profile>
                <id>aliyun-private</id>
                <repositories>
                  <repository>
                    <id>${ALIYUN_MAVEN_REPO_ID}</id>
                    <url>${ALIYUN_MAVEN_REPO_URL}</url>
                    <releases>
                      <enabled>true</enabled>
                    </releases>
                    <snapshots>
                      <enabled>true</enabled>
                    </snapshots>
                  </repository>
                </repositories>
                <pluginRepositories>
                  <pluginRepository>
                    <id>${ALIYUN_MAVEN_REPO_ID}</id>
                    <url>${ALIYUN_MAVEN_REPO_URL}</url>
                    <releases>
                      <enabled>true</enabled>
                    </releases>
                    <snapshots>
                      <enabled>true</enabled>
                    </snapshots>
                  </pluginRepository>
                </pluginRepositories>
              </profile>
            </profiles>
            <activeProfiles>
              <activeProfile>aliyun-private</activeProfile>
            </activeProfiles>
          </settings>
          EOF

      - name: Install parent POM
        run: mvn -B -U -s "$HOME/.m2/settings.xml" -DskipTests -f geelato-parent/pom.xml install

      - name: Build with Maven
        run: mvn -B -U -s "$HOME/.m2/settings.xml" -f pom.xml clean package -DskipTests -Dmaven.test.skip=true -Dautoconfig.skip=true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            **/target/*.jar
            **/target/*.war
          retention-days: 30
