name: Release to Maven Central

# 把 geelato community 核心库发布到 Sonatype Central Portal (https://central.sonatype.com)。
# 详见 geelato-community/RELEASE.md。
#
# 触发：推送 maven-central-v* 形式的 tag（如 maven-central-v1.0.0）。
#   注意：不能用 v*，它已被 release.yml（Docker release）占用。
#
# 发布范围（11 个 self-contained 库，全部在本仓库内、依赖均在公网）：
#   geelato-parent, geelato-framework-bom, geelato-framework-starter,
#   geelato-lang, geelato-utils, geelato-security, geelato-core,
#   geelato-meta, geelato-orm, geelato-web-common
#   （外加 BOM/starter 合计 10 个 reactor 模块 + parent）
#
# 上层模块（web-platform/web-runtime/app-scaffold-starter）依赖不在本仓库的
# geelato-package 与 plugin-all，故不纳入 CI，可改用本地 publish-central.bat 发布。
#
# 必需的 GitHub Secrets（一次性配置，见 RELEASE.md）：
#   CENTRAL_USERNAME   Central Portal User Token 用户名（usr_xxx）
#   CENTRAL_PASSWORD   Central Portal User Token 密码
#   GPG_PRIVATE_KEY    GPG 签名私钥（gpg --export-secret-keys --armor 的输出）
#   GPG_PASSPHRASE     私钥口令
#   GPG_KEYNAME        密钥 ID（gpg --list-secret-keys 的指纹/keyid）

on:
  push:
    tags:
      - 'maven-central-v*'

permissions:
  contents: read

jobs:
  release-central:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout community code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          cache-dependency-path: '**/pom.xml'

      - name: Parse release version from tag
        id: ver
        run: |
          # tag 形如 maven-central-v1.0.0 -> 去掉前缀得到 1.0.0
          TAG="${GITHUB_REF##*/}"               # maven-central-v1.0.0
          VER="${TAG#maven-central-v}"          # 1.0.0
          if [[ -z "$VER" || "$VER" == *SNAPSHOT* ]]; then
            echo "ERROR: 无法从 tag 解析正式版本号：$VER" >&2
            exit 1
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "解析到发布版本：$VER"

      - name: Import GPG signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          echo "allow-loopback-pinentry" > ~/.gnupg/gpg.conf
          # 验证私钥可用
          echo "$GPG_PASSPHRASE" | gpg --batch --yes --pinentry-mode loopback \
            --passphrase-fd 0 --list-secret-keys "${{ secrets.GPG_KEYNAME }}" >/dev/null 2>&1 \
            && echo "GPG 私钥导入成功" || { echo "ERROR: GPG 私钥/口令无效"; exit 1; }

      - name: Generate Maven settings (Central Portal token)
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
        run: |
          mkdir -p ~/.m2
          cat <<EOF > ~/.m2/settings.xml
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>central</id>
                <username>${CENTRAL_USERNAME}</username>
                <password>${CENTRAL_PASSWORD}</password>
              </server>
            </servers>
            <profiles>
              <profile>
                <id>central-mirror</id>
                <repositories>
                  <repository>
                    <id>central</id>
                    <url>https://repo1.maven.org/maven2/</url>
                    <releases><enabled>true</enabled></releases>
                    <snapshots><enabled>false</enabled></snapshots>
                  </repository>
                </repositories>
              </profile>
            </profiles>
            <activeProfiles>
              <activeProfile>central-mirror</activeProfile>
            </activeProfiles>
          </settings>
          EOF

      - name: Set release version on core libraries
        env:
          RELEASE_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          # 在 community 根 reactor 执行 versions:set，递归更新所有模块自身版本及 parent 引用版本。
          mvn -q versions:set \
            -DnewVersion="$RELEASE_VERSION" \
            -DprocessAllModules=true \
            -DgenerateBackupPoms=false

      - name: Install parent POM to local repo (required before modules resolve it)
        run: |
          # 子模块 <parent> 用空 <relativePath/>，会从本地仓库解析 parent，
          # 因此必须先把 1.0.0 的 parent 装进本地仓库。
          mvn -B -U -s ~/.m2/settings.xml -f geelato-parent/pom.xml install -DskipTests

      - name: Deploy core libraries to Central Portal
        env:
          RELEASE_VERSION: ${{ steps.ver.outputs.version }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          mvn -B -U -s ~/.m2/settings.xml deploy -P release -DskipTests \
            -pl geelato-parent,geelato-framework-bom,geelato-framework-starter,geelato-lang,geelato-utils,geelato-security,geelato-core,geelato-meta,geelato-orm,geelato-web-common \
            -Dgpg.keyname=${{ secrets.GPG_KEYNAME }} \
            -Dgpg.passphrase="$GPG_PASSPHRASE"

      - name: Summary
        env:
          RELEASE_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          echo "============================================================"
          echo " 已提交到 Central Portal，版本 $RELEASE_VERSION"
          echo " 登录 https://central.sonatype.com 查看发布状态。"
          echo " 产物最终可在 https://repo1.maven.org/maven2/cn/geelato/ 检索。"
          echo "============================================================"
