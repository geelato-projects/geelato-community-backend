databaseChangeLog:
  - changeSet:
      id: 001-init
      author: geelato
      changes:
        - createTable:
            tableName: demo_user
            columns:
              - column:
                  name: id
                  type: bigint
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(128)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: datetime
