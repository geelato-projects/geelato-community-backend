# Geelato MCP FMS (Fleet Management System) Configuration
server.port=8084
spring.application.name=geelato-mcp-fms

# MCP Configuration
geelato.mcp.enabled=true
geelato.mcp.server-name=geelato-mcp-fms
geelato.mcp.description=Geelato Fleet Management System (Order + Logistics)

spring.ai.mcp.server.protocol=SSE
spring.ai.mcp.server.name=geelato-mcp-fms
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.type=SYNC
spring.ai.mcp.server.instructions=Geelato Fleet Management System provides tools for order management and logistics tracking
spring.ai.mcp.server.resource-change-notification=true
spring.ai.mcp.server.tool-change-notification=true
spring.ai.mcp.server.prompt-change-notification=true
spring.ai.mcp.server.sse-message-endpoint=/mcp/fms/message
spring.ai.mcp.server.sse.sse-endpoint=/sse

# Order Service Configuration
geelato.mcp.order.query-timeout=30000

# Logistics Service Configuration
geelato.mcp.logistics.tracking-enabled=true

geelato.mcp.security.jwt.sign-key=geELaTo@McP
geelato.mcp.security.api-key.keys=geELaTo@McP
