spring:
  application:
    name: geelato-mcp-platform
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/geelato?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: geelato_user
    password: geelato@psd
    driver-class-name: com.mysql.cj.jdbc.Driver
  main:
    allow-circular-references: true

server:
  port: 8081

geelato:
  mcp:
    security:
      auth-type: hybrid
      api-key:
        header-name: X-API-Key
        keys:
          - dev-api-key-123456
        enabled: true
      jwt:
        header-name: Authorization
        prefix: "Bearer "
        sign-key: ${MCP_JWT_SIGN_KEY:}
        enabled: true

spring.ai:
  mcp:
    server:
      name: geelato-platform-mcp
      version: 1.0.0
