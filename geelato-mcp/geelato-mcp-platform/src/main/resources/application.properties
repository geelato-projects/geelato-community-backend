# Geelato MCP Platform Configuration
server.port=8081
spring.application.name=geelato-mcp-platform

# MCP 配置 - 启用自动配置
spring.ai.mcp.server.enabled=true
spring.ai.mcp.server.name=geelato-mcp-platform
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.sse-message-endpoint=/mcp/platform/message
spring.ai.mcp.server.type=SYNC

# 平台特有配置
geelato.mcp.enabled=true
geelato.mcp.server-name=geelato-mcp-platform
geelato.mcp.description=Geelato 平台元数据 MCP 服务
geelato.mcp.platform.meta.enabled=true
geelato.mcp.platform.view.enabled=true
geelato.mcp.platform.page.enabled=true

# Actuator 配置
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# Debug 日志 - 查看自动配置条件
debug=true
logging.level.org.springframework.ai=DEBUG
logging.level.io.modelcontextprotocol=DEBUG
