server.port=8080
geelato.web=${GEELATO_WEB_OPTION:true}
geelato.schedule=${GEELATO_SCHEDULE_OPTION:false}

geelato.orm.dao-bean-name=dynamicDao
geelato.datasource.dynamic.enable-jta-transaction=false
geelato.datasource.dynamic.enable-seata-proxy=false

#plugin
geelato.plugin.pluginDirectory=${GEELATO_PLUGIN_DIRECTORY}
geelato.plugin.pluginRepository=${GEELATO_PLUGIN_REPOSITORY:}

#### DB ####
spring.datasource.primary.name=primary
spring.datasource.primary.jdbc-url=${GEELATO_PRIMARY_JDBCURL:jdbc:mysql://localhost:3306/geelato?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowMultiQueries=true&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true}
spring.datasource.primary.username=${GEELATO_PRIMARY_JDBCUSER:geelato_user}
spring.datasource.primary.password=${GEELATO_PRIMARY_JDBCPASSWORD:geelato@psd}
spring.datasource.primary.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.primary.validationQuery=select 1
spring.datasource.primary.initialSize=5
spring.datasource.primary.minIdle=10
spring.datasource.primary.maxActive=1000
spring.datasource.primary.maxWait=60000
spring.datasource.primary.timeBetweenEvictionRunsMillis=60000
spring.datasource.primary.minEvictableIdleTimeMillis=300000

#p6sy#
decorator.datasource.p6spy.enable-logging=true
decorator.datasource.p6spy.log-file=/log/p6spy-sql.log

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

#### LOG ####
logging.config=${GEELATO_LOGBACK_CONFIG:classpath:geelato-logback.xml}
logging.level.root=INFO
logging.level.cn.geelato=debug
logging.level.org.apache.shiro=INFO
logging.level.org.springframework.jdbc.core=INFO
logging.pattern.console=[%-5level]%d{ss.SSS} %logger{36} %L- %m%n
geelato.meta.scan-package-names=cn.geelato
geelato.graal.scan-package-names=cn.geelato
geelato.es.debug=true
geelato.es.debug-max-length=20000
geelato.file.root.path=C:\\geelato\\files
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.compression.min-response-size=2048

#### MQL Playground\uFF08\u5728\u7EBF\u8C03\u8BD5\u4E0E\u6D4B\u8BD5\u573A\u666F\u96C6\uFF09 ####
# \u5F00\u542F\u540E\u53EF\u8BBF\u95EE http://host:port/mql-playground.html
# \u7AEF\u70B9\uFF1A/api/mql/explain|execute|validate|entities|schema|scenarios
# \u653E\u884C\u8DEF\u5F84\u5DF2\u5185\u7F6E\u5728 SecurityInterceptorProperties \u9ED8\u8BA4\u6392\u9664\u4E2D\uFF0C\u65E0\u9700\u989D\u5916\u914D\u7F6E
# \u751F\u4EA7\u73AF\u5883\u5E94\u8BBE\u4E3A false
geelato.mql.playground.enabled=true

#### STS OCR ####
aliyun.sts.ocr.accessKeyId=${GEELATO_STS_OCR_ACCESS_KEY_ID}
aliyun.sts.ocr.accessKeySecret=${GEELATO_STS_OCR_ACCESS_KEY_SECRET}
aliyun.sts.ocr.roleArn=${GEELATO_STS_OCR_ROLE_ARN}
aliyun.sts.ocr.regionId=${GEELATO_STS_OCR_REGION_ID:cn-hangzhou}
aliyun.sts.ocr.durationSeconds=${GEELATO_STS_OCR_DURATION_SECONDS:1800}
aliyun.sts.ocr.defaultUserId=${GEELATO_STS_OCR_DEFAULT_USER_ID:}

#### Mineru OCR ####
geelato.ocr.mineru.api-url=${GEELATO_OCR_MINERU_API_URL:https://mineru.net/api/v4/extract/task}
geelato.ocr.mineru.authorization=${GEELATO_OCR_MINERU_AUTHORIZATION:}

#### PDF Config ####
geelato.ocr.pdf.base-url=${GEELATO_OCR_PDF_BASE_URL:http://47.121.135.61}
geelato.ocr.pdf.save-path=${GEELATO_OCR_PDF_SAVE_PATH:/ocrpdf}

#### DeepSeek AI ####
geelato.ai.deepseek.base-url=${GEELATO_AI_DEEPSEEK_BASE_URL:https://api.deepseek.com/chat/completions}
geelato.ai.deepseek.api-key=${GEELATO_AI_DEEPSEEK_API_KEY:}
geelato.ai.deepseek.model=${GEELATO_AI_DEEPSEEK_MODEL:deepseek-v4-pro}
geelato.ai.deepseek.thinking-enabled=${GEELATO_AI_DEEPSEEK_THINKING_ENABLED:true}
geelato.ai.deepseek.reasoning-effort=${GEELATO_AI_DEEPSEEK_REASONING_EFFORT:max}

#Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379


geelato.upload.root-directory=/upload
geelato.upload.convert-directory=/upload/convert
geelato.upload.config-directory=/upload/config



spring.config.import=\
  classpath:properties/workflow.properties,\
  classpath:properties/seata.properties,\
  classpath:properties/oss.properties,\
  classpath:properties/package.properties,\
  classpath:properties/sc.properties,\
  classpath:properties/auth.properties,\
  classpath:properties/market.properties,\
  classpath:properties/message.properties,\
  classpath:properties/weixin_work.properties,\
  classpath:properties/elasticsearch.properties,\
  classpath:properties/monitor.properties
